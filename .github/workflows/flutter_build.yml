name: Build AutoFinder APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar el repositorio
      - uses: actions/checkout@v3

      # 2️⃣ Leer URL del ZIP desde download_link.txt
      - name: Read download URL
        id: get_url
        run: |
          URL=$(cat download_link.txt)
          echo "DOWNLOAD_URL=$URL" >> $GITHUB_ENV

      # 3️⃣ Instalar gdown para descargar archivos grandes de Drive
      - name: Install gdown
        run: pip install gdown

      # 4️⃣ Descargar el ZIP del proyecto desde Drive usando gdown
      - name: Download project ZIP from Drive
        run: gdown "$DOWNLOAD_URL" -O autofinderapp.zip

      # 5️⃣ Descomprimir el proyecto
      - name: Unzip project
        run: unzip autofinderapp.zip -d .

      # 6️⃣ Instalar Flutter
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      # 7️⃣ Instalar dependencias del proyecto
      - name: Install dependencies
        run: flutter pub get

      # 8️⃣ Construir APK release
      - name: Build APK
        run: flutter build apk --release

      # 9️⃣ Subir APK como artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: autofinder-apk
          path: build/app/outputs/flutter-apk/app-release.apk
