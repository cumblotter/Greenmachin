name: Build AutoFinder APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar el repositorio
      - uses: actions/checkout@v3

      # 2️⃣ Instalar gdown
      - name: Install gdown
        run: pip install gdown

      # 3️⃣ Descargar el ZIP desde Drive
      - name: Download project ZIP
        run: gdown https://drive.google.com/uc?id=13y6NUtJAtVFGLiF4YgHBGqM5LqCuvGBp -O autofinderapp.zip

      # 4️⃣ Descomprimir
      - name: Unzip project
        run: unzip autofinderapp.zip -d ./autofinderapp

      # 5️⃣ Usar Flutter preinstalado con acción comprobada
      - uses: subosito/flutter-action@v1
        with:
          flutter-version: '3.13.0' # versión estable que SÍ funciona en Actions

      # 6️⃣ Instalar dependencias
      - run: flutter pub get
        working-directory: ./autofinderapp

      # 7️⃣ Build APK
      - run: flutter build apk --release
        working-directory: ./autofinderapp

      # 8️⃣ Subir APK
      - uses: actions/upload-artifact@v4
        with:
          name: autofinder-apk
          path: ./autofinderapp/build/app/outputs/flutter-apk/app-release.apk
