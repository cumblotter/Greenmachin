name: Build AutoFinder APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar repositorio
      - uses: actions/checkout@v3

      # 2️⃣ Instalar gdown para descargar tu ZIP de Drive
      - name: Install gdown
        run: pip install gdown

      # 3️⃣ Descargar tu ZIP desde Drive
      - name: Download project ZIP
        run: gdown https://drive.google.com/uc?id=13y6NUtJAtVFGLiF4YgHBGqM5LqCuvGBp -O autofinderapp.zip

      # 4️⃣ Descomprimir el proyecto
      - name: Unzip project
        run: unzip autofinderapp.zip -d ./autofinderapp

      # 5️⃣ Instalar Flutter **versión fija que SÍ funciona**
      - uses: subosito/flutter-action@v1
        with:
          flutter-version: '3.13.0'  # NUNCA usar “stable” en v2

      # 6️⃣ Instalar dependencias
      - name: Install dependencies
        run: flutter pub get
        working-directory: ./autofinderapp

      # 7️⃣ Construir APK release
      - name: Build APK
        run: flutter build apk --release
        working-directory: ./autofinderapp

      # 8️⃣ Subir APK como artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: autofinder-apk
          path: ./autofinderapp/build/app/outputs/flutter-apk/app-release.apk
